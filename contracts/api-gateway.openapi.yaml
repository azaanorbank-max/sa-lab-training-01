openapi: "3.1.0"
info:
  title: API Gateway
  version: "1.0.0"
  description: |
    Security boundary and routing layer.
    Injects X-Correlation-Id, forwards headers, proxies to payment-service.
    No business logic. No state.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /api/p2p/transfer:
    post:
      summary: Create P2P transfer (TO-BE)
      operationId: transfer
      tags: [proxy]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
          description: Generated by gateway if not provided
        - name: X-Fail-Mode
          in: header
          required: false
          schema:
            type: string
            enum: [TIMEOUT, ERROR, DUPLICATE_TEST]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Proxied response from payment-service
          headers:
            X-Correlation-Id:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: string
            X-RateLimit-Remaining:
              schema:
                type: string

  /api/p2p/transfer-legacy:
    post:
      summary: Create P2P transfer (AS-IS)
      operationId: transferLegacy
      tags: [proxy]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Proxied response from payment-service (legacy)

  /health:
    get:
      summary: Health check
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
